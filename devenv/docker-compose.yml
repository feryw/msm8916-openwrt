services:
  chown-fix:
    image: alpine:latest
    command: >
      sh -c "chown -R 1000:1000 /home/builder/immortalwrt/dl /home/builder/immortalwrt/bin"
    volumes:
      - ../bin:/home/builder/immortalwrt/bin
      - dl:/home/builder/immortalwrt/dl
    user: root
    restart: "no"

  builder:
    build:
      context: ..
      dockerfile: devenv/Dockerfile
      args:
        IMMORTALWRT_VERSION: ${IMMORTALWRT_VERSION:-master}
    container_name: immortalwrt-builder
    working_dir: /home/builder/immortalwrt
    stdin_open: true
    tty: true
    volumes:
      - ..:/repo
      - ../packages:/home/builder/immortalwrt/package/msm8916
      - ../msm89xx:/home/builder/immortalwrt/target/linux/msm89xx
      - ../bin:/home/builder/immortalwrt/bin
      - dl:/home/builder/immortalwrt/dl
    command: ["/bin/bash"]
    depends_on:
      chown-fix:
        condition: service_completed_successfully

volumes:
  dl:
#  build_dir:
